name: "Images Security scan"

on:
  workflow_dispatch:

permissions: {} # No permissions by default

jobs:
  trivy-image-scan:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    permissions:
      contents: read
      security-events: write # Needed to upload the results to code-scanning dashboard
    strategy:
      matrix:
        ai-device: [cpu]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run container image scan (${{ matrix.ai-device }})
        uses: ./.github/actions/trivy-scan-image
        with:
          artifact-name: "trivy-scan-container-${{ matrix.ai-device }}"
          scan_type: "image"
          scan_target: "ghcr.io/open-edge-platform/physical-ai-studio-${{ matrix.ai-device }}:main"
          scan-scope: all
          severity: "LOW"
          scanners: "vuln,secret,config"
          format: "table"
          timeout: "15m"
          ignore_unfixed: "true"
