name: Publish Application RC to GHCR

on:
  push:
    tags:
      - 'app/v[0-9]+\.[0-9]+\.[0-9]+rc[0-9]+'

permissions: {} # No permissions by default

jobs:
  validate:
    name: Validate tag and VERSION
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    outputs:
      rc_version: "${{ steps.validate.outputs.rc_version }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate tag
        id: validate
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Extract version from tag: app/v0.1.0rc1 -> 0.1.0rc1
          RC_VERSION="${TAG#app/v}"
          
          # Extract base version without rc suffix: 0.1.0rc1 -> 0.1.0
          TAG_VERSION="${RC_VERSION%rc*}"
          
          # Extract RC number: 0.1.0rc1 -> 1
          RC_NUMBER="${RC_VERSION##*rc}"
          
          # Extract major.minor for branch validation: 0.1.0 -> 0.1
          MAJOR_MINOR="${TAG_VERSION%.*}"
          
          # Construct expected release branch name
          EXPECTED_BRANCH="release/app-${MAJOR_MINOR}"
          
          # Read VERSION file
          FILE_VERSION="$(tr -d '[:space:]' < application/VERSION)"
          
          # Get the commit SHA that the tag points to
          TAG_COMMIT="${GITHUB_SHA}"

          echo "::group::Validation parameters"
          echo "Tag: $TAG"
          echo "RC version: $RC_VERSION"
          echo "Tag base version: $TAG_VERSION"
          echo "RC number: $RC_NUMBER"
          echo "VERSION file: $FILE_VERSION"
          echo "Expected release branch: $EXPECTED_BRANCH"
          echo "Tagged commit: $TAG_COMMIT"
          echo "::endgroup::"

          # Validate RC number is a positive integer
          if ! [[ "$RC_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::Invalid RC number '$RC_NUMBER'. RC number must be a positive integer (rc1, rc2, etc.)"
            exit 1
          fi
          echo "✓ RC number is valid"

          # Validate VERSION file format (semver: major.minor.patch)
          if ! [[ "$FILE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::VERSION file contains invalid semver format: '$FILE_VERSION'"
            exit 1
          fi
          echo "✓ VERSION file has valid semver format"

          # Validate tag version matches VERSION file
          if [[ "$TAG_VERSION" != "$FILE_VERSION" ]]; then
            echo "::error::Tag version '$TAG_VERSION' does not match VERSION file '$FILE_VERSION'"
            exit 1
          fi
          echo "✓ Tag version matches VERSION file"

          # Validate expected release branch exists
          if ! git rev-parse --verify "origin/${EXPECTED_BRANCH}" >/dev/null 2>&1; then
            echo "::error::Release branch '${EXPECTED_BRANCH}' does not exist"
            exit 1
          fi
          echo "✓ Release branch exists"
          
          # Validate tagged commit is on the release branch
          if ! git merge-base --is-ancestor "${TAG_COMMIT}" "origin/${EXPECTED_BRANCH}"; then
            echo "::error::Tag '${TAG}' (commit ${TAG_COMMIT}) is not on release branch '${EXPECTED_BRANCH}'"
            echo "::error::RC tags must be created from commits on the corresponding release branch"
            exit 1
          fi
          echo "✓ Tag is correctly assigned to release branch ${EXPECTED_BRANCH}"

          echo "rc_version=$RC_VERSION" >> "$GITHUB_OUTPUT"

  publish-rc:
    name: Build & Push RC (${{ matrix.device }})
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read # Checkout code
      packages: write # Push images to GHCR
      id-token: write # Cosign keyless signing (OIDC)

    strategy:
      fail-fast: false
      matrix:
        device: [cpu] # TODO: add xpu, cuda when ready

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/alexanderbarabanov/test-image-${{ matrix.device }} # TODO: own acc
          tags: |
            type=raw,value=${{ needs.validate.outputs.rc_version }}

      - name: Build and push Docker image
        uses: ./.github/actions/docker-build
        with:
          device: ${{ matrix.device }}
          push: "true"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          use-cache: "false" # Disable cache for RC builds (security & reproducibility)

      - name: Sign Docker image
        uses: open-edge-platform/geti-ci/actions/sign-image@9b1ef60a8b2b802da428621e192c322960f4b3d5
        with:
          image-uri: ${{ steps.meta.outputs.tags }}
