name: Weekly Dependency Audit Fix

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:
    inputs:
      force_fix:
        description: "Run npm audit fix --force (includes breaking changes)"
        required: false
        default: false
        type: boolean
permissions: {} # No permissions by default on workflow level

jobs:
  audit-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create commits and PRs
      pull-requests: write # to create PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: application/ui/.nvmrc

      - name: Install dependencies
        working-directory: application/ui
        run: npm ci

      - name: Display audit report
        working-directory: application/ui
        continue-on-error: true
        run: |
          npm audit || true

      - name: Run npm audit fix (safe mode)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.force_fix != 'true' }}
        working-directory: application/ui
        continue-on-error: true
        run: npm audit fix --package-lock-only || echo "Some issues could not be auto-fixed"

      - name: Run npm audit fix (force mode)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_fix == 'true' }}
        working-directory: application/ui
        continue-on-error: true
        run: npm audit fix --force

      - name: Check for changes
        id: check-changes
        working-directory: application/ui
        run: |
          if git diff --quiet package-lock.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR if lockfile changed
        if: steps.check-changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5b4a9f6a9e2af26e5f02351490b90d01eb8ec1e5 # v7.0.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(security): automated npm audit fixes"
          title: "fix(security): update dependencies to resolve vulnerabilities"
          body: |
            Automated dependency security updates.

            ## Mode
            ${{ github.event_name == 'schedule' && 'Safe mode (scheduled)' || (github.event.inputs.force_fix == 'true' && 'Force mode (manual)' || 'Safe mode (manual)') }}

            ## Command
            ${{ github.event.inputs.force_fix == 'true' && '`npm audit fix --force`' || '`npm audit fix --package-lock-only --audit-level=moderate`' }}

            ## Changes
            - Updated dependency lockfile to resolve security vulnerabilities
            - ${{ github.event.inputs.force_fix == 'true' && 'May include updates to `package.json` (breaking changes possible)' || 'No changes to `package.json` dependencies' }}

            ## Testing
            Run the full test suite on this PR before merging.

            ## Notes
            - Schedule: Every Monday at 05:00 UTC
            - Safe mode: Fixes vulnerabilities without breaking changes
            - Force mode: Available via manual workflow dispatch (may include breaking changes)

            ## Automation
            This PR was automatically created by the Weekly Dependency Audit Fix workflow.
          branch: "audit-fix-${{ github.run_id }}"
          base: main
          labels: |
            dependencies
            security
          delete-branch: true
