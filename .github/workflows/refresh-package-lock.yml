name: Weekly Dependency Audit Fix

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch: {}
permissions: {} # No permissions by default on workflow level

jobs:
  audit-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create commits and PRs
      pull-requests: write # to create PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: application/ui/.nvmrc

      - name: Install dependencies
        working-directory: application/ui
        run: npm ci

      - name: Run npm audit fix (lockfile-only)
        working-directory: application/ui
        run: |
          set -e
          npm audit fix --package-lock-only

      - name: Check for changes
        id: check-changes
        working-directory: application/ui
        run: |
          if git diff --quiet package-lock.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR if lockfile changed
        if: steps.check-changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5b4a9f6a9e2af26e5f02351490b90d01eb8ec1e5 # v7.0.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update lockfile with npm audit fix"
          title: "fix: update package-lock to resolve vulnerabilities"
          body: |
            This PR updates `package-lock.json` using `npm audit fix --package-lock-only`.

            ## Changes
            - Updated dependency lockfile to resolve security vulnerabilities
            - No changes to `package.json` dependencies

            ## Testing
            Run the full test suite on this PR before merging.

            ## Automation
            This PR was automatically created by the Weekly Dependency Audit Fix workflow.
          branch: "audit-fix-${{ github.run_id }}"
          base: main
          labels: dependencies
          delete-branch: true