name: NPM Audit Fix

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:
    inputs:
      force_fix:
        description: "Run npm audit fix --force (includes breaking changes)"
        required: false
        default: false
        type: boolean
permissions: {} # No permissions by default on workflow level

jobs:
  npm-audit-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: read # to checkout code

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: application/ui/.nvmrc

      - name: Install dependencies
        working-directory: application/ui
        run: npm ci

      - name: Display audit report
        working-directory: application/ui
        continue-on-error: true
        run: |
          npm audit || true

      - name: Run npm audit fix (safe mode)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.force_fix != 'true' }}
        working-directory: application/ui
        continue-on-error: true
        run: npm audit fix --package-lock-only || echo "Some issues could not be auto-fixed"

      - name: Run npm audit fix (force mode)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_fix == 'true' }}
        working-directory: application/ui
        continue-on-error: true
        run: npm audit fix --force || true

      - name: Check for changes
        id: check-changes
        working-directory: application/ui
        run: |
          if git diff --quiet package-lock.json package.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # GitHub App token is required to trigger other workflows (GITHUB_TOKEN cannot trigger workflows)
      - name: Get token
        if: steps.check-changes.outputs.changed == 'true'
        id: get-github-app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PEM }}

      - name: Get app details
        if: steps.check-changes.outputs.changed == 'true'
        id: app-details
        run: |
          APP_SLUG=$(gh api /app --jq '.slug')
          BOT_USER=$(gh api "/users/${APP_SLUG}[bot]" --jq '.id')
          echo "author=${APP_SLUG}[bot] <${BOT_USER}+${APP_SLUG}[bot]@users.noreply.github.com>" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ steps.get-github-app-token.outputs.token }}

      - name: Create PR if lockfile changed
        if: steps.check-changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5b4a9f6a9e2af26e5f02351490b90d01eb8ec1e5 # v7.0.5
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
          author: ${{ steps.app-details.outputs.author }}
          committer: ${{ steps.app-details.outputs.author }}
          commit-message: "fix(deps): automated npm audit fixes [security]"
          title: "fix(deps): automated npm audit fixes [security]"
          body: |
            This PR was automatically created to update NPM dependencies with:

            ${{ github.event.inputs.force_fix == 'true' && '`npm audit fix --force`' || '`npm audit fix --package-lock-only --audit-level=moderate`' }}

          branch: "npm-audit-fix-${{ github.run_id }}"
          base: main
          delete-branch: true
